<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vworld 3D Map</title>
    <style>
        body, html, #vmap { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }
        .loading {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 10; flex-direction: column; gap: 10px; font-family: sans-serif; color: #64748b; font-size: 13px;
        }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>3D 지도를 불러오고 있습니다</span>
    </div>
    <div id="vmap"></div>

    <script>
        // 0. Vworld 엔진 내부 버그 패치 (removeEventListener 파라미터 누락 해결)
        const originalRemoveEventListener = EventTarget.prototype.removeEventListener;
        EventTarget.prototype.removeEventListener = function(type, listener, options) {
            if (listener === undefined) return; // listener가 없으면 무시 (Vworld 버그 우회)
            return originalRemoveEventListener.call(this, type, listener, options);
        };

        // 1. URL 파라미터 파싱
        const urlParams = new URLSearchParams(window.location.search);
        const lon = parseFloat(urlParams.get('lon'));
        const lat = parseFloat(urlParams.get('lat'));
        const apiKey = urlParams.get('apikey');
        const domain = window.location.hostname; // 현재 도메인 동적으로 전송 (CORS 대응)

        if (!lon || !lat || !apiKey) {
            document.getElementById('loading').innerHTML = '지도 좌표 또는 API Key가 제공되지 않았습니다.';
        } else {
            // 2. 동기식(document.write) 로드: Vworld API 내부 document.write 문제를 해결
            const scriptUrl = `https://map.vworld.kr/js/webglMapInit.js.do?version=2.0&domain=${domain}&apiKey=${apiKey}`;
            document.write('<script src="' + scriptUrl + '"><\/script>');
        }
    </script>
    <script>
        if (lon && lat && apiKey) {
            // 3. Vworld 객체가 준비될 때까지 대기
            const checkVw = setInterval(() => {
                if (window.vw && window.vw.Map) {
                    clearInterval(checkVw);
                    try {
                        const mapOptions = {
                            controlsAutoArrange: true,
                            homePosition: new vw.CameraPosition(
                                new vw.CoordZ(lon, lat, 400),
                                new vw.Direction(0, -45, 0)
                            ),
                            initPosition: new vw.CameraPosition(
                                new vw.CoordZ(lon, lat, 400),
                                new vw.Direction(0, -45, 0)
                            )
                        };
                        
                        const map = new vw.Map("vmap", mapOptions);
                        
                        document.getElementById('loading').style.display = 'none';
                    } catch (err) {
                        console.error(err);
                        document.getElementById('loading').innerHTML = '3D 맵 엔진 초기화에 실패했습니다.';
                    }
                }
            }, 300);

            // 타임아웃 처리 (최대 10초)
            setTimeout(() => {
                clearInterval(checkVw);
                if (!window.vw || !window.vw.Map) {
                    document.getElementById('loading').innerHTML = '네트워크 문제로 3D 맵 엔진을 불러올 수 없습니다. 팝업 차단 등을 확인해주세요.';
                }
            }, 10000);
        }
    </script>
</body>
</html>
