<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vworld 3D Map</title>
    <style>
        body, html, #vmap { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }
        .loading {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 10; flex-direction: column; gap: 10px; font-family: sans-serif; color: #64748b; font-size: 13px;
        }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>3D 지도를 불러오고 있습니다</span>
    </div>
    <div id="vmap"></div>

    <script>
        // 0. Vworld 엔진 내부 버그 패치 (removeEventListener 파라미터 누락 해결)
        var originalRemoveEventListener = EventTarget.prototype.removeEventListener;
        EventTarget.prototype.removeEventListener = function(type, listener, options) {
            if (listener === undefined) return;
            return originalRemoveEventListener.call(this, type, listener, options);
        };

        // 1. URL 파라미터 파싱
        var urlParams = new URLSearchParams(window.location.search);
        var lon = parseFloat(urlParams.get('lon'));
        var lat = parseFloat(urlParams.get('lat'));
        var apiKey = urlParams.get('apikey');
        var domain = window.location.hostname;

        function initVworldMap() {
            var checkVw = setInterval(function() {
                if (window.vw && window.vw.Map) {
                    clearInterval(checkVw);
                    try {
                        var mapOptions = {
                            controlsAutoArrange: true,
                            homePosition: new vw.CameraPosition(
                                new vw.CoordZ(lon, lat, 400),
                                new vw.Direction(0, -45, 0)
                            ),
                            initPosition: new vw.CameraPosition(
                                new vw.CoordZ(lon, lat, 400),
                                new vw.Direction(0, -45, 0)
                            )
                        };
                        var map = new vw.Map("vmap", mapOptions);
                        document.getElementById('loading').style.display = 'none';
                    } catch (err) {
                        console.error('Vworld Map Init Error:', err);
                        document.getElementById('loading').innerHTML = '3D 맵 엔진 초기화에 실패했습니다.';
                    }
                }
            }, 300);

            setTimeout(function() {
                clearInterval(checkVw);
                if (!window.vw || !window.vw.Map) {
                    document.getElementById('loading').innerHTML = '네트워크 문제로 3D 맵 엔진을 불러올 수 없습니다.';
                }
            }, 15000);
        }

        if (!lon || !lat || !apiKey) {
            document.getElementById('loading').innerHTML = '지도 좌표 또는 API Key가 제공되지 않았습니다.';
        } else {
            // 2. 동기식 XHR로 스크립트 텍스트를 가져와 eval 실행 (document.write 우회)
            var scriptUrl = 'https://map.vworld.kr/js/webglMapInit.js.do?version=2.0&domain=' + domain + '&apiKey=' + apiKey;
            
            // 방법: createElement로 스크립트를 동기 삽입
            var s = document.createElement('script');
            s.src = scriptUrl;
            s.onload = initVworldMap;
            s.onerror = function() {
                document.getElementById('loading').innerHTML = '네트워크 문제로 지도를 불러올 수 없습니다.';
            };
            // document.write를 임시로 허용 (Vworld 내부에서 호출)
            var origWrite = document.write.bind(document);
            document.write = function(html) {
                var tmp = document.createElement('div');
                tmp.innerHTML = html;
                var scripts = tmp.querySelectorAll('script');
                scripts.forEach(function(sc) {
                    var newSc = document.createElement('script');
                    if (sc.src) newSc.src = sc.src;
                    else newSc.textContent = sc.textContent;
                    document.head.appendChild(newSc);
                });
                var nonScripts = tmp.querySelectorAll(':not(script)');
                nonScripts.forEach(function(el) { document.body.appendChild(el); });
            };
            document.head.appendChild(s);
        }
    </script>
</body>
</html>
