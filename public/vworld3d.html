<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vworld 3D Map</title>
    <style>
        body, html, #vmap { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }
        .loading {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 10; flex-direction: column; gap: 10px; font-family: sans-serif; color: #64748b; font-size: 13px;
        }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); } }

        /* 타겟 이동 버튼 */
        #target-btn {
            position: absolute; bottom: 16px; right: 16px; z-index: 999;
            background: #ef4444; color: white; border: none; border-radius: 10px;
            padding: 10px 18px; font-size: 13px; font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
            box-shadow: 0 4px 14px rgba(239,68,68,0.4);
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s; animation: pulse 2s infinite;
        }
        #target-btn:hover { background: #dc2626; transform: scale(1.05); }
        #target-btn:active { transform: scale(0.98); }

        /* 초기 안내 배너 */
        #init-banner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 998; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            animation: fadeOut 5s ease forwards;
        }
        #init-banner .banner-text {
            background: rgba(239, 68, 68, 0.9); color: white;
            padding: 8px 20px; border-radius: 8px;
            font-size: 14px; font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        #init-banner .banner-arrow {
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 18px solid rgba(239, 68, 68, 0.9);
        }
        #init-banner .banner-ring {
            width: 40px; height: 40px; border-radius: 50%;
            border: 4px solid rgba(239, 68, 68, 0.7);
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>3D 지도를 불러오고 있습니다</span>
    </div>
    <div id="vmap"></div>

    <!-- 초기 안내 배너: "여기가 타겟 건물입니다" (5초 후 자동 사라짐) -->
    <div id="init-banner" style="display:none;">
        <div class="banner-text">📍 여기가 타겟 건물입니다</div>
        <div class="banner-arrow"></div>
        <div class="banner-ring"></div>
    </div>

    <!-- 타겟 위치로 이동 버튼 (항상 우하단에 표시) -->
    <button id="target-btn" style="display:none;" onclick="flyToTarget()">
        🎯 타겟 위치로
    </button>

    <script>
        // 0. Vworld 엔진 내부 버그 패치
        var originalRemoveEventListener = EventTarget.prototype.removeEventListener;
        EventTarget.prototype.removeEventListener = function(type, listener, options) {
            if (listener === undefined) return;
            return originalRemoveEventListener.call(this, type, listener, options);
        };

        // 1. URL 파라미터 파싱
        var urlParams = new URLSearchParams(window.location.search);
        var lon = parseFloat(urlParams.get('lon'));
        var lat = parseFloat(urlParams.get('lat'));
        var apiKey = urlParams.get('apikey');
        var domain = window.location.hostname;

        // 현재 타겟 좌표
        var targetLon = lon;
        var targetLat = lat;

        // 타겟으로 카메라 이동
        function flyToTarget() {
            if (window.vmapInstance && window.vw && window.vw.CameraPosition) {
                var movePo = new vw.CameraPosition(
                    new vw.CoordZ(targetLon, targetLat, 100),
                    new vw.Direction(0, -35, 0)
                );
                if (typeof window.vmapInstance.moveTo === 'function') {
                    window.vmapInstance.moveTo(movePo);
                } else if (window.vmapInstance.getViewCamera && typeof window.vmapInstance.getViewCamera().move === 'function') {
                    window.vmapInstance.getViewCamera().move(movePo);
                }
                // 이동 후 안내 배너 다시 표시 (3초)
                showBanner();
            }
        }

        // 안내 배너 표시
        function showBanner() {
            var banner = document.getElementById('init-banner');
            if (banner) {
                banner.style.display = 'flex';
                banner.style.animation = 'none';
                banner.offsetHeight; // reflow
                banner.style.animation = 'fadeOut 4s ease forwards';
            }
        }

        function initVworldMap() {
            var checkVw = setInterval(function() {
                if (window.vw && window.vw.Map) {
                    clearInterval(checkVw);
                    try {
                        var mapOptions = {
                            controlsAutoArrange: true,
                            homePosition: new vw.CameraPosition(
                                new vw.CoordZ(lon, lat, 100),
                                new vw.Direction(0, -35, 0)
                            ),
                            initPosition: new vw.CameraPosition(
                                new vw.CoordZ(lon, lat, 100),
                                new vw.Direction(0, -35, 0)
                            )
                        };
                        var map = new vw.Map("vmap", mapOptions);
                        window.vmapInstance = map;
                        
                        document.getElementById('loading').style.display = 'none';

                        // 버튼 & 배너 표시
                        document.getElementById('target-btn').style.display = 'flex';
                        showBanner();

                    } catch (err) {
                        console.error('Vworld Map Init Error:', err);
                        document.getElementById('loading').innerHTML = '3D 맵 엔진 초기화에 실패했습니다.';
                    }
                }
            }, 300);

            setTimeout(function() {
                clearInterval(checkVw);
                if (!window.vw || !window.vw.Map) {
                    document.getElementById('loading').innerHTML = '네트워크 문제로 3D 맵 엔진을 불러올 수 없습니다.';
                }
            }, 15000);
        }

        // 부모 창(리액트)으로부터의 검색/이동 메시지 수신
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'MOVE_CAMERA') {
                var newLon = e.data.lon;
                var newLat = e.data.lat;
                targetLon = newLon;
                targetLat = newLat;

                if (window.vmapInstance && window.vw && window.vw.CameraPosition) {
                    var movePo = new vw.CameraPosition(
                        new vw.CoordZ(newLon, newLat, 100),
                        new vw.Direction(0, -35, 0)
                    );
                    if (typeof window.vmapInstance.moveTo === 'function') {
                        window.vmapInstance.moveTo(movePo);
                    } else if (window.vmapInstance.getViewCamera && typeof window.vmapInstance.getViewCamera().move === 'function') {
                        window.vmapInstance.getViewCamera().move(movePo);
                    }
                    // 이동 후 안내 배너 표시
                    showBanner();
                }
            }
        });

        if (!lon || !lat || !apiKey) {
            document.getElementById('loading').innerHTML = '지도 좌표 또는 API Key가 제공되지 않았습니다.';
        } else {
            var scriptUrl = 'https://map.vworld.kr/js/webglMapInit.js.do?version=2.0&domain=' + domain + '&apiKey=' + apiKey;
            
            var scriptsToLoad = [];
            var origWrite = document.write.bind(document);
            document.write = function(html) {
                var tmp = document.createElement('div');
                tmp.innerHTML = html;
                var scripts = tmp.querySelectorAll('script');
                scripts.forEach(function(sc) {
                    if (sc.src) {
                        scriptsToLoad.push(sc.src);
                    } else {
                        scriptsToLoad.push({ code: sc.innerHTML });
                    }
                });
                var nonScripts = tmp.querySelectorAll(':not(script)');
                nonScripts.forEach(function(el) { document.body.appendChild(el); });
            };

            function loadNextScript(callback) {
                if (scriptsToLoad.length === 0) {
                    if (callback) callback();
                    return;
                }
                var target = scriptsToLoad.shift();
                var newSc = document.createElement('script');
                if (typeof target === 'string') {
                    newSc.src = target;
                    newSc.onload = function() { loadNextScript(callback); };
                    newSc.onerror = function(err) { console.warn('Script load error:', target); loadNextScript(callback); };
                    document.head.appendChild(newSc);
                } else {
                    newSc.textContent = target.code;
                    document.head.appendChild(newSc);
                    setTimeout(function() { loadNextScript(callback); }, 0);
                }
            }

            var s = document.createElement('script');
            s.src = scriptUrl;
            s.onload = function() {
                loadNextScript(initVworldMap);
            };
            s.onerror = function() {
                document.getElementById('loading').innerHTML = '네트워크 문제로 지도를 불러올 수 없습니다.';
            };
            document.head.appendChild(s);
        }
    </script>
</body>
</html>
